services:
  postgres:
    image: postgres:16-alpine
    container_name: tcb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: thinkcashback
      POSTGRES_PASSWORD: thinkcashback
      POSTGRES_DB: thinkcashback
    ports:
      - '5432:5432'
    volumes:
      - tcb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U thinkcashback']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tcb-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - tcb_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tcb_pgdata:
  tcb_redisdata:
